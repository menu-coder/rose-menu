<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Fit Menü</title>

<style>
body {
    margin: 0;
    background: #f5f2eb;
}

/* LOGO SABİT */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: #f5f2eb;
    text-align: center;
    padding: 12px 0;
    z-index: 1000;
}

.logo {
    width: 110px;
}

/* MENÜ */
.content {
    margin-top: 100px;
}

/* GÖRSELLER - NET */
.menu-img {
    width: 100%;
    height: auto;
    image-rendering: auto; /* blur engeller */
    display: block;
}

/* KALİTE ARTTIRMA */
img {
    max-width: 100%;
    height: auto;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
</div>

<div class="content">

<img src="kahvalti.png" class="menu-img">
<img src="tost.png" class="menu-img">
<img src="et-bowl.png" class="menu-img">
<img src="tavuk-bowl.png" class="menu-img">
<img src="balik-bowl.png" class="menu-img">
<img src="vegan-bowl.png" class="menu-img">
<img src="salata.png" class="menu-img">
<img src="tatli.png" class="menu-img">
<img src="icecek.png" class="menu-img">

</div>

</body>
</html>
