<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Fit Menü</title>

<style>
body {
    margin: 0;
    background: #f5f2eb;
    font-family: Arial, sans-serif;
}

/* SABİT HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(245, 242, 235, 0.95);
    backdrop-filter: blur(6px);
    text-align: center;
    padding: 10px 0;
    z-index: 1000;
}

/* LOGO */
.logo {
    width: 120px;
}

/* İÇERİĞİ AŞAĞI İT */
.content {
    margin-top: 100px;
}

/* MENU SECTION */
.menu-section {
    position: relative;
}

/* IMAGE */
.menu-section img {
    width: 100%;
    display: block;
}

/* OVERLAY */
.overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
    font-size: 26px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    padding: 8px 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- SABİT LOGO -->
<div class="header">
    <img src="logo.png" class="logo">
</div>

<div class="content">

<div class="menu-section">
    <img src="kahvalti.png">
    <div class="overlay">Kahvaltı</div>
</div>

<div class="menu-section">
    <img src="tost.png">
    <div class="overlay">Tost & Sandviç</div>
</div>

<div class="menu-section">
    <img src="balik-bowl.png">
    <div class="overlay">Balık Bowl</div>
</div>

<div class="menu-section">
    <img src="et-bowl.png">
    <div class="overlay">Et Bowl</div>
</div>

<div class="menu-section">
    <img src="tavuk-bowl.png">
    <div class="overlay">Tavuk Bowl</div>
</div>

<div class="menu-section">
    <img src="vegan-bowl.png">
    <div class="overlay">Vegan Bowl</div>
</div>

<div class="menu-section">
    <img src="salata.png">
    <div class="overlay">Salatalar</div>
</div>

<div class="menu-section">
    <img src="tatli.png">
    <div class="overlay">Tatlılar</div>
</div>

<div class="menu-section">
    <img src="icecek.png">
    <div class="overlay">İçecekler</div>
</div>

</div>

</body>
</html>
