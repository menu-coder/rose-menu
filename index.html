<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Fit Menü</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f2eb;
}

/* KAPAK */
.cover {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #f5f2eb;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

.cover img {
    width: 75%;
    max-width: 450px;
}
.lang-btn {
    display: none;
    }
/* DİL BUTONU */
.lang-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: black;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 1500;
    cursor: pointer;
}

/* MENÜ */
.menu {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.menu.show {
    opacity: 1;
    transform: translateY(0);
}

.content {
    margin-top: 20px;
}

.menu-img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<!-- KAPAK -->
<div class="cover" id="cover" onclick="openMenu()">
    <img src="logo.png">
</div>

<!-- DİL BUTONU -->
<div class="lang-btn" onclick="toggleLang()">EN</div>

<!-- MENÜ -->
<div class="menu" id="menu">

<!-- TÜRKÇE -->
<div id="tr" class="content">
    <img src="kahvalti.png" class="menu-img">
    <img src="tost.png" class="menu-img">
    <img src="et-bowl.png" class="menu-img">
    <img src="tavuk-bowl.png" class="menu-img">
    <img src="balik-bowl.png" class="menu-img">
    <img src="vegan-bowl.png" class="menu-img">
    <img src="salata.png" class="menu-img">
    <img src="tatli.png" class="menu-img">
    <img src="icecek.png" class="menu-img">
</div>

<!-- ENGLISH -->
<div id="en" class="content" style="display:none;">
    <img src="kahvalti-en.png" class="menu-img">
    <img src="tost-en.png" class="menu-img">
    <img src="et-bowl-en.png" class="menu-img">
    <img src="tavuk-bowl-en.png" class="menu-img">
    <img src="balik-bowl-en.png" class="menu-img">
    <img src="vegan-bowl-en.png" class="menu-img">
    <img src="salata-en.png" class="menu-img">
    <img src="tatli-en.png" class="menu-img">
    <img src="icecek-en.png" class="menu-img">
</div>

</div>

<script>
function openMenu() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("menu").classList.add("show");
  document.querySelector(".lang-btn").style.display = "block";
}

function toggleLang() {
  var tr = document.getElementById("tr");
  var en = document.getElementById("en");
  var btn = document.querySelector(".lang-btn");

  if (tr.style.display === "none") {
    tr.style.display = "block";
    en.style.display = "none";
    btn.innerText = "EN";
  } else {
    tr.style.display = "none";
    en.style.display = "block";
    btn.innerText = "TR";
  }
}
</script>

</body>
</html>
